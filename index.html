<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d9488">
<title>火炭會聚會 v3</title>
<style>
:root{
  --pri:#0d9488;--pri-hover:#0f766e;--pri-light:#f0fdfa;
  --bg:#f8fafc;--surface:#fff;--border:#e2e8f0;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --danger:#ef4444;--success:#10b981;--warn:#f59e0b;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 4px rgba(0,0,0,.08);
  --radius:12px;--radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e2e8f0;color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#fff}
#top{background:var(--pri);color:#fff;text-align:center;padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top,0));flex-shrink:0}
#top h1{font-size:17px;font-weight:700;letter-spacing:-.2px}
#top .sub{font-size:11px;opacity:.85;margin-top:2px;font-weight:500}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
#bar{display:flex;align-items:stretch;justify-content:center;padding:0;padding-bottom:env(safe-area-inset-bottom,0);background:rgba(255,255,255,.95);color:var(--text);flex-shrink:0;border-top:1px solid rgba(0,0,0,.08)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px 8px;cursor:pointer;transition:all .15s;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;-webkit-tap-highlight-color:transparent;outline:none}
.tab-item .tab-icon{font-size:20px;line-height:1}
.tab-item.active{color:var(--pri)}
.tab-item:active{opacity:.7}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--border)}
.hdr .cnt{background:var(--pri);color:#fff;font-size:10px;padding:2px 10px;border-radius:10px;font-weight:600}

.row{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background .15s;background:var(--surface);border-bottom:1px solid var(--border)}
.row:active{background:var(--pri-light)}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;color:#fff}
.av.member{background:var(--success)}.av.guest{background:var(--warn)}
.info{flex:1;min-width:0}
.info .n{font-weight:600;font-size:15px;color:var(--text)}
.info .m{font-size:12px;color:var(--text2);margin-top:1px}
.row .tbl{font-size:13px;font-weight:700;color:var(--pri);background:var(--pri-light);padding:4px 10px;border-radius:12px;flex-shrink:0;margin-left:auto}

.loading{text-align:center;padding:80px 20px;color:var(--text3)}
.nomeet{text-align:center;padding:80px 20px;color:var(--text3)}
.nomeet h3{font-size:18px;color:var(--text2);margin-bottom:6px}

.result{padding:32px 20px 100px;background:var(--surface);text-align:center;min-height:100%}
.result .rname{font-size:20px;font-weight:700;margin-bottom:4px;color:var(--text)}
.result .rtime{font-size:14px;color:var(--pri);font-weight:600;margin-bottom:24px}

.pay-amount{text-align:center;padding:8px 0 24px}
.pay-amount .symbol{font-size:13px;color:var(--text2);margin-bottom:4px;font-weight:500}
.pay-amount .amt{font-size:48px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-1px}
.pay-amount .note{font-size:13px;color:var(--text3);margin-top:8px}

.pay-links{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.pay-links a{flex:1;max-width:110px;padding:12px 8px;border-radius:var(--radius-sm);color:#fff;text-decoration:none;font-size:12px;font-weight:700;text-align:center;transition:opacity .15s;letter-spacing:-.2px}
.pay-links a:active{opacity:.85}

.upload-card{background:var(--bg);border:2px dashed #cbd5e1;border-radius:var(--radius);padding:24px 20px;margin-bottom:12px;text-align:center}
.upload-card .uc-icon{font-size:28px;margin-bottom:8px}
.upload-card .uc-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px}
.upload-card input[type=file]{width:100%;font-size:12px;color:var(--text2);margin-bottom:12px}
.upload-card input[type=file]::file-selector-button{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;margin-right:8px}
.btn{display:block;width:100%;padding:13px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .15s;text-align:center}
.btn-primary{background:var(--pri);color:#fff}
.btn-primary:active{background:var(--pri-hover)}
.btn-ghost{background:var(--surface);color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:active{background:var(--bg)}

.card2{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px 16px;margin:12px 16px;box-shadow:var(--shadow-sm)}
.card2 h3{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.sched{font-size:13px;color:var(--text2);line-height:2;white-space:pre-line}
.msg2{background:var(--pri-light);border:1px solid #99f6e4;border-radius:var(--radius);padding:14px 16px;margin:8px 16px;text-align:center;font-size:13px;color:var(--pri-hover);line-height:1.7;white-space:pre-line;font-weight:500}

.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.dbox{background:var(--surface);border-radius:18px;padding:28px 24px;width:100%;max-width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.dbox .dn{font-size:19px;font-weight:700;margin-bottom:4px}
.dbox .dm{font-size:13px;color:var(--text2);margin-bottom:18px}
.dbox .db{display:flex;gap:8px}
.dbox .db button{flex:1;padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.btn-no{background:var(--bg);color:var(--text2)}.btn-no:active{background:#e2e8f0}
.btn-yes{background:var(--pri);color:#fff}.btn-yes:active{background:var(--pri-hover)}
.dimmed{opacity:.3;pointer-events:none}
</style>
</head>
<body>
<div id="app">
<div id="top"><h1>火炭會聚會 <span style="font-size:10px;opacity:.5">v3.0</span></h1><div id="sub"></div></div>
<div id="main"></div>
<div id="bar"><button id="bar-unchecked" class="tab-item active" onclick="switchTab('unchecked')"><span class="tab-icon">👥</span><span>未簽到</span></button><button id="bar-checked" class="tab-item" onclick="switchTab('checked')"><span class="tab-icon">✅</span><span>已簽到</span></button><button class="tab-item" onclick="showSchedule()"><span class="tab-icon">📋</span><span>流程</span></button><button class="tab-item" onclick="showGame()"><span class="tab-icon">🎮</span><span>遊戲</span></button><button class="tab-item" onclick="showProductIntro()"><span class="tab-icon">🏅</span><span>委員介紹</span></button><button class="tab-item" onclick="showAlbum()"><span class="tab-icon">📸</span><span>相簿</span></button></div>
</div>
<script>
var API='/api';
var meeting=null,members=[],guests=[],checked=[],locked=false,last=null,searchQ='';

var D={
  lunchFee:'388',paymeLink:'https://payme.hsbc/fotan',
  wcLink:'https://pay.weixin.qq.com/',aliLink:'https://www.alipayhk.com/',fpsPhone:'97188675',aliQrImg:'',fpsQrImg:'',
  productIntro:'',gameInfo:'',albumLink:'',aboutUs:'',joinLink:'',skipCheckin:'1',
  schedule:'12:30 報到及交流\n12:45 例會正式開始\n13:00 會員介紹 (30秒每位)\n13:20 專題分享\n13:40 來賓介紹\n14:00 商業引薦\n14:30 午宴及自由交流\n15:00 活動結束',
  chairmanMsg:'感謝您今天蒞臨火炭會聚會！\n期待每個月也可以見面！'
};

function E(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
var TN={};
function T(tbl){if(!tbl)return'';var n=String(parseInt(tbl));return TN[n]||('第'+n+'號枱');}
function C(n,v,d){if(v===undefined){var m=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return m?decodeURIComponent(m[2]):null}var e='';if(d){var t=new Date();t.setTime(t.getTime()+d*86400000);e=';expires='+t.toUTCString()}document.cookie=n+'='+encodeURIComponent(v)+e+';path=/;SameSite=Lax'}

function A(p,o){return fetch(API+p,Object.assign({},o||{},{headers:(o&&o.body)?{'Content-Type':'application/json'}:{}})).then(function(r){return r.json()})}

function init(){
  document.getElementById('sub').textContent='載入中...';
  var main=document.getElementById('main');
  A('/settings').then(function(s){
    if(s){for(var k in s){if(D.hasOwnProperty(k))D[k]=s[k]}}
  });
  A('/meetings').then(function(ms){
    var today=new Date().toISOString().split('T')[0];
    var upcoming=ms.filter(function(m){return m.date>=today}).sort(function(a,b){return a.date.localeCompare(b.date)});
    meeting=upcoming[0];
    if(!meeting){
      document.getElementById('sub').textContent='簽到';
      main.innerHTML='<div class="nomeet"><h3>暫無即將舉行的聚會</h3><p style="margin-top:4px;font-size:13px">請到後台建立</p></div>';
      return;
    }
    var prefix=meeting.date===today?'📅 ':'📅 [即將舉行] ';
    document.getElementById('sub').textContent=prefix+meeting.date+' '+(meeting.type==='regular'?'例會':meeting.type==='anniversary'?'週年聚餐':'特別會議');
    A('/settings').then(function(s){if(s&&s['seating_names_'+meeting.id]){try{TN=JSON.parse(s['seating_names_'+meeting.id])}catch(e){}}});
    return Promise.all([A('/members'),A('/guests'),A('/attendance?meeting_id='+meeting.id)]);
  }).then(function(r){
    if(!r)return;
    members=r[0];guests=r[1];checked=r[2];locked=false;
    // Check cookie for previous check-in
    var ck=C('fotan_ci');
    if(ck){try{var ci=JSON.parse(ck);if(ci.mid===meeting.id){locked=true;last=ci;}}catch(e){}}
    render();
  });
}

var tabFilter='unchecked';
function switchTab(tab){
  locked=false;last=null;
  tabFilter=tab;
  searchQ='';
  document.querySelectorAll('.tab-item').forEach(function(b){b.classList.toggle('active',b.id==='bar-'+tab)});
  render();
}

function showSchedule(){
  var sched=D.schedule||'暫無節目表';
  showInfoModal('📋 時間表', sched.replace(/\n/g,'<br>'));
}

function showChairmanMsg(){
  var msg=D.chairmanMsg||'暫無主席的話';
  showInfoModal('💬 主席的話', msg.replace(/\n/g,'<br>'));
}

function showProductIntro(){
  var msg=D.productIntro||'暫無委員介紹';
  showInfoModal('🏅 委員介紹', msg.replace(/\n/g,'<br>'));
}

function showGame(){
  var msg=D.gameInfo||'暫無遊戲資訊';
  showInfoModal('🎮 遊戲', msg.replace(/\n/g,'<br>'));
}

function showAlbum(){
  if(D.albumLink){
    window.open(D.albumLink,'_blank');
  } else {
    showInfoModal('📸 相簿', '相簿連結尚未設定');
  }
}

function playBeep(freq, dur, type){
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq || 800;
    gain.gain.value = 0.3;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (dur||0.2));
    osc.stop(ctx.currentTime + (dur||0.2));
  } catch(e) {}
}

function playSuccess(){
  playBeep(880, 0.15, 'sine');
  setTimeout(function(){ playBeep(1100, 0.2, 'sine'); }, 100);
}

function showAboutUs(){
  var msg=(D.aboutUs||'暫無火炭會介紹').replace(/\n/g,'<br>');
  if(D.joinLink) msg+='<br><br><a href="'+E(D.joinLink)+'" target="_blank" style="color:var(--pri);font-weight:700;text-decoration:none;font-size:16px">✍️ 申請入會 →</a>';
  showInfoModal('ℹ️ 火炭會介紹', msg);
}

function showInfoModal(title, body){
  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="dbox" style="max-width:360px;max-height:80vh;overflow-y:auto;text-align:left"><div class="dn">'+title+'</div><div style="font-size:14px;color:var(--text);line-height:1.8">'+body+'</div><button class="btn-yes" style="width:100%;margin-top:16px;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer" onclick="this.closest(\'.overlay\').remove()">關閉</button></div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove()});
  document.body.appendChild(ov);
}

function showPersonCard(type, pid){
  var list=type==='member'?members:guests;
  var p=list.find(function(x){return x.id===pid});
  if(!p) return;
  var name=E(p.name);
  var tel=E(p.tel||'');
  var prof=E(p.professional||'');
  var email=E(p.email||'');
  var role=E(p.role||'');
  var att = checked.find(function(a){return a.person_type===type&&a.person_id===pid});
  var tbl=(att&&att.table_number)?att.table_number:(p.table_number||'');
  var seat=(att&&att.seat_order)?att.seat_order:(p.seat_order||'');
  var tblName=T(tbl);
  if(tblName&&seat)tblName+=' · '+seat+'號位';
  var label=type==='member'?'會員':type==='guest'?'來賓':'觀察員';

  var body='<div style="text-align:center;margin-bottom:12px"><div class="av '+type+'" style="width:56px;height:56px;font-size:22px;margin:0 auto 8px">'+name.charAt(0)+'</div><div style="font-size:20px;font-weight:700">'+name+'</div><div style="font-size:13px;color:var(--text2)">'+label+'</div></div>';
  if(tblName) body+='<div style="text-align:center;margin-bottom:8px"><span style="background:var(--pri-light);color:var(--pri);padding:4px 14px;border-radius:12px;font-weight:700;font-size:14px">🍽 '+tblName+'</span></div>';
  if(role&&role!=='會員') body+='<div style="padding:8px 0;font-size:15px">🏅 '+role+'</div>';
  if(prof) body+='<div style="padding:8px 0;font-size:15px">💼 '+prof+'</div>';
  var bio=E(p.bio||'');
  if(bio) body+='<div style="padding:10px 12px;margin:8px 0;background:var(--bg);border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-line">📝 '+bio+'</div>';
  if(tel) body+='<div style="padding:8px 0;font-size:15px">📱 <a href="tel:+852'+tel.replace(/[^0-9]/g,'')+'" style="color:var(--pri);text-decoration:none;font-weight:600">'+tel+'</a></div>';
  if(email) body+='<div style="padding:8px 0;font-size:15px">📧 '+email+'</div>';

  if(tel){
    body+='<a href="'+vcfLink(p)+'" download="'+name+'.vcf" style="display:block;text-align:center;margin-top:12px;padding:12px;background:var(--pri-light);color:var(--pri);border-radius:10px;text-decoration:none;font-weight:700;font-size:14px">📇 加入通訊錄 (vCard)</a>';
  }

  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="dbox" style="max-width:340px"><div class="dn" style="font-size:11px;color:var(--text2)">'+label+'資料</div>'+body+'<button class="btn-yes" style="width:100%;margin-top:12px;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer" onclick="this.closest(\'.overlay\').remove()">關閉</button></div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove()});
  document.body.appendChild(ov);
}

function vcfLink(p){
  var name=E(p.name||'');
  var tel=(p.tel||'').replace(/[^0-9]/g,'');
  var vcf='BEGIN:VCARD\nVERSION:3.0\nFN:'+name+'\nTEL;TYPE=CELL:+852'+tel+'\n';
  if(p.professional) vcf+='TITLE:'+E(p.professional)+'\n';
  if(p.email) vcf+='EMAIL:'+E(p.email)+'\n';
  vcf+='END:VCARD';
  return 'data:text/vcard;charset=utf-8,'+encodeURIComponent(vcf);
}

function allPeople(){
  var map={};checked.forEach(function(a){map[a.person_type+'_'+a.person_id]=a});
  var all=[];
  members.forEach(function(p){if(map['member_'+p.id])all.push({p:p,type:'member',label:'會員',att:map['member_'+p.id]})});
  guests.forEach(function(p){if(map['guest_'+p.id])all.push({p:p,type:'guest',label:'來賓',att:map['guest_'+p.id]})});
  // Show all people with a table assignment in this meeting
  all=all.filter(function(x){return !!(x.att&&x.att.table_number);});
  all.sort(function(a,b){return (a.p.name||'').localeCompare(b.p.name||'')});
  return all;
}

function render(){
  var main=document.getElementById('main');
  if(locked&&last){
    var paid=last.payment&&last.payment!=='unpaid'&&last.payment!=='';
    var defaultFee = parseInt(D.lunchFee) || 388;
    var displayFee = defaultFee;
    if (last.tier === 'early_bird') displayFee = (meeting&&meeting.early_bird_fee) || defaultFee;
    else if (last.tier === 'walk_in') displayFee = (meeting&&meeting.walk_in_fee) || defaultFee;
    else if (last.type === 'guest') displayFee = (meeting&&meeting.guest_fee) || defaultFee;
    else displayFee = (meeting&&meeting.member_fee) || defaultFee;
    var fee=E(String(displayFee)),sched=E(D.schedule),chair=E(D.chairmanMsg);
    var feeLabel = last.tier==='early_bird'?'早鳥價':(last.tier==='walk_in'?'臨場價':(last.type==='guest'?'來賓價':'會員價'));
    var h='<div class="result">';
    h+='<div class="icon">'+(paid?'✅':'📤')+'</div>';
    h+='<div class="rname">'+E(last.name)+'</div>';
    h+='<div class="rtime">'+E(last.time)+'</div>';
    if(paid){
      h+='<div style="text-align:center;padding:20px 0">';
      h+='<div style="font-size:48px;margin-bottom:16px">✅</div>';
      h+='<div style="font-size:14px;font-weight:700;color:var(--success);margin-bottom:4px">簽到確認</div>';
      h+='<div style="font-size:20px;font-weight:700;margin-bottom:4px">多謝光臨</div>';
      h+='<div style="font-size:14px;color:var(--text2);margin-bottom:20px">'+(last.tbl?'🍽 '+T(last.tbl):'')+'</div>';
      if(D.schedule)h+='<div class="card2"><h3>節目表</h3><div class="sched">'+sched+'</div></div>';
      if(D.chairmanMsg)h+='<div class="msg2">'+chair+'</div>';
      h+='</div>';
    }else{
      h+='<div class="pay-amount">';
      h+='<div class="symbol">午餐費用 · '+feeLabel+'</div>';
      h+='<div class="amt">HK$'+fee+'</div>';
      h+='<div class="note">請完成付款後上傳憑證</div>';
      h+='</div>';

      if(D.paymeLink||D.wcLink||D.aliLink){
        h+='<div class="pay-links">';
        if(D.paymeLink)h+='<a href="'+E(D.paymeLink)+'" target="_blank" style="background:#e31b5f">PayMe</a>';
if(D.aliLink)h+='<a href="javascript:void(0)" onclick="showAlipayQR('+fee+')" style="background:#1677ff">Alipay</a>';
        if(D.fpsPhone)h+='<a href="javascript:void(0)" onclick="showFPSQR(\''+E(D.fpsPhone)+'\','+fee+')" style="background:#6366f1">FPS</a>';
        h+='</div>';
      }

      h+='<div class="upload-card">';
      h+='<div class="uc-icon">📤</div>';
      h+='<div class="uc-title">上傳付款憑證</div>';
      h+='<input type="file" id="guest-receipt" accept="image/*">';
      h+='<button onclick="uploadGuestReceipt('+last.attId+')" class="btn btn-primary">確認上傳</button>';
      h+='<div id="upload-status" style="margin-top:8px;font-size:12px"></div>';
      h+='</div>';

      if(D.skipCheckin!=='0') h+='<button onclick="directCheckin('+last.attId+')" class="btn btn-ghost">跳過，直接簽到</button>';
    }
    h+='</div>';
    main.innerHTML=h;
    return;
  }

  var allPeople2=allPeople();
  var all=allPeople2.filter(function(x){return !x.att||(!x.att.arrival_time&&x.att.arrival_time!=='absent');});
  var done=allPeople2.filter(function(x){return !!(x.att&&x.att.arrival_time&&x.att.arrival_time!=='absent');});
  var total=allPeople2.length;

  if(tabFilter==='checked'){
    main.innerHTML='<div class="hdr"><span>已簽到嘉賓</span><span class="cnt">'+done.length+'</span></div>'+
      done.map(function(x){return renderRow(x);}).join('');
    main.querySelectorAll('.row').forEach(function(row){
      row.addEventListener('click',function(){
        showPersonCard(row.dataset.type,parseInt(row.dataset.id));
      });
    });
  } else {
    // Filter by search query
    var filtered=all;
    if(searchQ){
      var q=searchQ.toLowerCase();
      filtered=all.filter(function(x){
        return (x.p.name||'').toLowerCase().indexOf(q)!==-1 ||
          (x.p.professional||'').toLowerCase().indexOf(q)!==-1 ||
          (x.p.tel||'').indexOf(searchQ)!==-1 ||
          (x.p.role||'').toLowerCase().indexOf(q)!==-1 ||
          (x.p.email||'').toLowerCase().indexOf(q)!==-1;
      });
    }
    main.innerHTML='<div class="hdr"><span>未簽到嘉賓</span><span class="cnt">'+filtered.length+' / '+total+'</span></div>'+
      '<div style="padding:8px 16px"><input id="search-input" type="text" placeholder="搜尋名字/電話/行業/職位..." value="'+E(searchQ)+'" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--bg)" oninput="searchQ=this.value;render()"></div>'+
      filtered.map(function(x){return renderRow(x);}).join('');
    main.querySelectorAll('.row').forEach(function(row){
      row.addEventListener('click',function(){
        if(locked)return;
        showConfirm(row.dataset.type,parseInt(row.dataset.id),row.dataset.name,row.dataset.label);
      });
    });
  }
  // Update tab button counts
  var uBtn=document.getElementById('bar-unchecked');
  var cBtn=document.getElementById('bar-checked');
  if(uBtn) uBtn.innerHTML = '<span class="tab-icon">👥</span><span>未簽到 ('+all.length+')</span>';
  if(cBtn) cBtn.innerHTML = '<span class="tab-icon">✅</span><span>已簽到 ('+done.length+')</span>';
}

function renderRow(x){
  var meta=x.p.professional||x.p.chapter||x.label;
  var payText='';
  if(x.att){
    var p=x.att.payment||'';
    if(p==='paid'||p==='free') payText='<span style="color:#10b981;font-size:10px;font-weight:600;flex-shrink:0;margin-right:4px">已付款</span>';
    else payText='<span style="color:#ef4444;font-size:10px;font-weight:600;flex-shrink:0;margin-right:4px">未付款</span>';
  }
  var tblNum=(x.att&&x.att.table_number)?x.att.table_number:(x.p.table_number||'');
  var seatNo=(x.att&&x.att.seat_order)?x.att.seat_order:(x.p.seat_order||'');
  var tblLabel=tblNum?T(tblNum):'';
  if(tblLabel&&seatNo)tblLabel+=' · '+seatNo+'號位';
  var tbl=tblLabel?'<span class="tbl">'+E(tblLabel)+'</span>':'';
  return '<div class="row" data-type="'+x.type+'" data-id="'+x.p.id+'" data-name="'+E(x.p.name)+'" data-label="'+x.label+'"><div class="av '+x.type+'">'+E(x.p.name.charAt(0))+'</div><div class="info"><div class="n">'+E(x.p.name)+'</div><div class="m">'+E(meta)+'</div></div>'+payText+tbl+'</div>';
}

function showConfirm(type,id,name,label){
  // Unpaid → redirect to payment page
  var att=checked.find(function(a){return a.person_type===type&&a.person_id===id});
  var isUnpaid=att&&(!att.payment||att.payment==='unpaid');
  if(isUnpaid){
    locked=true;
    last={name:name,time:'',payment:'unpaid',attId:att.id,type:type,tbl:att.table_number||''};
    render();
    return;
  }
  document.getElementById('main').classList.add('dimmed');
  document.getElementById('top').classList.add('dimmed');
  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="dbox"><div class="dn">'+E(name)+'</div><div class="dm">'+E(label)+'</div><p style="margin-bottom:14px;color:#64748b">確認簽到？</p><div class="db"><button class="btn-no" id="bn">取消</button><button class="btn-yes" id="by">✓ 確認</button></div></div>';
  document.body.appendChild(ov);
  var clean=function(){document.body.removeChild(ov);document.getElementById('main').classList.remove('dimmed');document.getElementById('top').classList.remove('dimmed')};
  document.getElementById('bn').onclick=clean;
  document.getElementById('by').onclick=function(){
    document.getElementById('by').disabled=true;
    document.getElementById('bn').disabled=true;
    document.getElementById('by').textContent='處理中...';
    doCheckin(type,id,name).then(function(r){
      if(!r){clean();return;}
      locked=true;last=r;clean();
      C('fotan_ci',JSON.stringify({name:r.name,time:r.time,payment:r.payment,attId:r.attId,tbl:r.tbl,mid:meeting.id}),1);
      render();playSuccess();
    }).catch(function(e){
      alert(e&&e.message==='已簽到'?'此人已簽到，請勿重複簽到':'簽到失敗，請重試');
      clean();
    });
  };
  ov.addEventListener('click',function(e){if(e.target===ov)clean()});
}

function doCheckin(type,id,name){
  var exist=checked.find(function(a){return a.person_type===type&&a.person_id===id});
  var now=new Date(),time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  // Block unpaid people from checking in
  if(exist && (!exist.payment || exist.payment==='unpaid')){
    return Promise.reject(new Error('請先完成付款後再簽到'));
  }
  var row=document.querySelector('.row[data-type="'+type+'"][data-id="'+id+'"]');
  if(row){row.remove();var hdr=document.querySelector('.hdr .cnt');if(hdr){var cur=hdr.textContent.split('/');var n=parseInt(cur[0])+1;hdr.textContent=n+' / '+cur[1];}}
  if(exist&&exist.arrival_time){
    return Promise.reject(new Error('已簽到'));
  }
  if(exist){
    var personList=type==='member'?members:guests;
    var person=personList.find(function(p){return p.id===id});
    var tbl=exist.table_number||(person?person.table_number||'':'');
    var seat=exist.seat_order??(person?person.seat_order:null);
    return A('/attendance',{method:'PUT',body:JSON.stringify({id:exist.id,arrival_time:time,table_number:tbl,seat_order:seat})}).then(function(r){return{name:name,time:time,payment:exist.payment,attId:exist.id,type:type,tbl:tbl}});
  }
  // New attendance record — get table from person record
  var personList2=type==='member'?members:guests;
  var person2=personList2.find(function(p){return p.id===id});
  var newTbl=person2?person2.table_number||'':'';
  var newSeat=person2?person2.seat_order:null;
  var newPay=(type==='member')?'paid':'';
  return A('/attendance',{method:'POST',body:JSON.stringify({meeting_id:meeting.id,person_type:type,person_id:id,arrival_time:time,payment:newPay,table_number:newTbl,seat_order:newSeat})}).then(function(r){return{name:name,time:time,payment:newPay,attId:r.id,type:type,tbl:newTbl}});
}

  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="dbox" style="max-width:320px"><div class="dn">💙 Alipay HK</div><div class="dm">HK$'+fee+'</div><img src="'+(D.aliQrImg||'/api/image?name=qr-alipay')+'" style="width:200px;height:200px;margin:0 auto 12px;display:block;border-radius:12px;object-fit:contain" onerror="this.src=\'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent('https://www.alipayhk.com/')+'\'"><p style="font-size:11px;color:#94a3b8">長按QR Code儲存到手機</p><button class="btn-yes" style="width:100%;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer" onclick="this.parentElement.parentElement.remove()">關閉</button></div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove()});
  document.body.appendChild(ov);
}
function showFPSQR(phone,fee){
  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="dbox" style="max-width:320px"><div class="dn">🏦 FPS 轉數快</div><div class="dm">HK$'+fee+' · 收款電話 '+phone+'</div><img src="'+(D.fpsQrImg||'/api/image?name=qr-fps')+'" style="width:200px;height:200px;margin:0 auto 12px;display:block;border-radius:12px;object-fit:contain" onerror="this.src=\'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent('https://fotan.techforliving.net/api/fps-redirect?phone='+phone+'&am='+fee)+'\'"><p style="font-size:11px;color:#94a3b8">長按QR Code儲存到手機</p><button class="btn-yes" style="width:100%;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer" onclick="this.parentElement.parentElement.remove()">關閉</button></div>';
  ov.addEventListener('click',function(e){if(e.target===ov)ov.remove()});
  document.body.appendChild(ov);
}
function directCheckin(attId){
  var now=new Date(),time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var att=checked.find(function(a){return a.id===attId});
  var personList=att?.(att.person_type==='member'?members:guests);
  var person=personList?.find(function(p){return p.id===att.person_id});
  var tbl=att?.table_number||(person?person.table_number||'':'');
  var seat=att?.seat_order??(person?person.seat_order:null);
  A('/attendance',{method:'PUT',body:JSON.stringify({id:attId,payment:'paid',arrival_time:time,table_number:tbl,seat_order:seat})}).then(function(){
    document.getElementById('main').innerHTML='<div class="result"><div style="font-size:48px;margin-bottom:16px">✅</div><div class="rname">簽到完成</div><div class="rtime">多謝光臨</div><button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px">返回</button></div>';
    playSuccess();
  });
}
function uploadGuestReceipt(attId){
  var file=document.getElementById('guest-receipt').files[0];
  if(!file){alert('請選擇付款截圖');return;}
  var status=document.getElementById('upload-status');
  status.innerHTML='上傳中...';
  var reader=new FileReader();
  reader.onload=function(){
    A('/checkin-upload',{method:'POST',body:JSON.stringify({attendance_id:attId,data:reader.result})}).then(function(r){
      if(r.ok){
        status.innerHTML='<span style="color:#10b981">✅ 上傳成功！</span>';
        setTimeout(function(){
          document.getElementById('main').innerHTML='<div class="result"><div style="font-size:48px;margin-bottom:16px">🎉</div><div class="rname">感謝</div><div class="rtime">付款憑證已收到</div><button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px">返回</button></div>';
          // receipt uploaded
        },1000);
      }else{
        status.innerHTML='<span style="color:#ef4444">❌ 上傳失敗，請重試</span>';
      }
    }).catch(function(){
      status.innerHTML='<span style="color:#ef4444">❌ 網絡錯誤，請重試</span>';
    });
  };
  reader.readAsDataURL(file);
}
