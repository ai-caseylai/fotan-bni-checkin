<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — 火炭會聚會</title>
  <style>
    :root {
      --pri: #0d9488;
      --pri-hover: #0f766e;
      --bg: #f1f5f9;
      --surface: #fff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text2: #64748b;
      --danger: #ef4444;
      --success: #10b981;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 40px 32px;
      width: 380px;
      max-width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .card .icon { font-size: 44px; margin-bottom: 8px; }
    .card h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .card .sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

    .field { text-align: left; margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
      background: var(--surface);
      color: var(--text);
    }
    .field input:focus { border-color: var(--pri); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; padding: 11px 20px; border-radius: 8px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
      transition: background .15s;
    }
    .btn-primary { background: var(--pri); color: #fff; }
    .btn-primary:hover { background: var(--pri-hover); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .msg { font-size: 13px; margin-top: 10px; display: none; }
    .msg.error { color: var(--danger); display: block; }
    .msg.success { color: var(--success); display: block; }

    .links { font-size: 13px; color: var(--text2); margin-top: 16px; display: flex; justify-content: center; gap: 16px; }
    .links a { color: var(--pri); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>用戶登入</h1>
    <p class="sub">火炭會聚會簽到系統</p>

    <form id="login-form" onsubmit="doLogin();return false">
      <div class="field">
        <label for="login-user">用戶名</label>
        <input type="text" id="login-user" placeholder="輸入用戶名" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="login-pwd">密碼</label>
        <input type="password" id="login-pwd" placeholder="輸入密碼" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">登入</button>
    </form>
    <p id="login-msg" class="msg"></p>
    <div class="links">
      <a href="/register">註冊新帳戶</a>
      <a href="/admin/">管理員登入</a>
    </div>
  </div>

  <script>
    // Auto-redirect if already logged in
    (async function(){
      try{
        var check=await fetch('/api/auth?action=check').then(function(r){return r.json()});
        if(check.ok){window.location.href='/';return}
      }catch(e){}
    })();

    async function doLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pwd  = document.getElementById('login-pwd').value;
      const msg  = document.getElementById('login-msg');
      const btn  = document.getElementById('login-btn');

      msg.className = 'msg';
      msg.textContent = '';

      if (!user) { msg.className = 'msg error'; msg.textContent = '請輸入用戶名'; return; }
      if (!pwd)  { msg.className = 'msg error'; msg.textContent = '請輸入密碼'; return; }

      btn.disabled = true;
      btn.textContent = '登入中...';

      try {
        const res = await fetch('/api/auth?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pwd })
        });
        const data = await res.json();
        if (data.ok) {
          msg.className = 'msg success';
          msg.textContent = '✅ 登入成功，跳轉中...';
          setTimeout(function(){ window.location.href = '/'; }, 800);
        } else {
          msg.className = 'msg error';
          msg.textContent = data.error || '登入失敗';
        }
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = '連線失敗，請檢查網路';
      }
      btn.disabled = false;
      btn.textContent = '登入';
    }
  </script>
</body>
</html>
