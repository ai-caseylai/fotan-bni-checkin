      </header>
      <div id="page-content"></div>
    </main>
    <div id="chat-panel">
      <div id="chat-header">
        <span id="chat-session-label" style="cursor:pointer" onclick="toggleSessionList()">🤖 聚會助理 ▾</span>
        <div style="display:flex;gap:4px">
          <button id="chat-new-session" onclick="createSession()" title="新對話" style="background:none;border:none;font-size:16px;cursor:pointer;padding:0 4px;color:#94a3b8">+</button>
          <button id="chat-collapse" onclick="toggleChatPanel()" title="收合">◀</button>
        </div>
      </div>
      <div id="session-list" style="display:none;background:#f8fafc;border-bottom:1px solid var(--border);max-height:160px;overflow-y:auto"></div>
      <div id="chat-msgs"><div class="chat-msg system">🦞 Yo！我係龍蝦仔，有咩幫到你？</div></div>
      <div id="chat-img-preview" style="display:none;padding:6px 8px 0;border-top:1px solid var(--border)"></div>
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="輸入問題..." onkeydown="if(event.key==='Enter')sendChat()">
        <input type="file" id="chat-file" accept=".pdf,.xls,.xlsx,.jpg,.jpeg,.png,image/*" onchange="handleChatFile(this)" style="display:none">
        <button onclick="document.getElementById('chat-file').click()" title="上傳檔案/圖片" style="background:none;border:none;font-size:16px;cursor:pointer;padding:4px">📎</button>
        <button id="chat-send" onclick="sendChat()">➤</button>
      </div>
      <div style="padding:4px 8px;background:#f8fafc;border-top:1px solid var(--border);display:flex;gap:4px">
        <button class="btn btn-sm btn-outline" onclick="loadTelegramChats()" style="font-size:10px;padding:3px 8px">📱 TG 對話</button>
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('chat-msgs').style.display='';document.getElementById('tg-log').style.display='none'" style="font-size:10px;padding:3px 8px">💬 Chat</button>
      </div>
      <div id="tg-log" style="display:none;flex:1;overflow-y:auto;padding:8px;font-size:11px"></div>
    </div>
